name: Fetch arXiv Papers Daily

on:
  schedule:
    # 每天北京时间 09:00 跑(UTC 01:00)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 也支持手动触发

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run fetcher
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: python scripts/fetch_papers.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/papers scripts/.processed.json
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore: daily arxiv papers update $(date -u +'%Y-%m-%d')"
            git push
          fi
